<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APRS Messenger</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header { background: #16213e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f3460; }
    header h1 { font-size: 18px; color: #00d4ff; }
    #status { font-size: 13px; color: #4ecca3; }
    #status.disconnected { color: #e74c3c; }

    #pending-bar { padding: 6px 15px; background: #2a2a1e; color: #f0c040; font-size: 12px; border-bottom: 1px solid #0f3460; display: none; }

    #filter-bar { padding: 8px 15px; background: #0f3460; color: #00d4ff; font-size: 13px; display: none; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
    #filter-bar .filter-close { cursor: pointer; color: #888; font-size: 12px; text-decoration: underline; }
    #filter-bar .filter-close:hover { color: #e0e0e0; }

    .main-layout { display: flex; flex: 1; overflow: hidden; }

    /* Left: map + messages */
    #left-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #map { height: 45%; min-height: 200px; }
    #messages-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 10px 15px; }
    .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 6px; max-width: 80%; }
    .msg.tx { background: #0f3460; margin-left: auto; text-align: right; }
    .msg.rx { background: #1a3a1a; }
    .msg.retry { background: #3a3a1a; font-style: italic; font-size: 13px; }
    .msg .meta { font-size: 11px; color: #888; margin-bottom: 2px; }
    .msg .body { word-wrap: break-word; }

    #send-form { padding: 10px; background: #16213e; border-top: 2px solid #0f3460; display: flex; gap: 8px; }
    #send-form input { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 12px; font-family: inherit; font-size: 14px; border-radius: 4px; }
    #dest { width: 120px; }
    #text { flex: 1; }
    .btn { background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff; padding: 8px 20px; font-family: inherit; font-size: 14px; cursor: pointer; border-radius: 4px; }
    .btn:hover { background: #00d4ff; color: #1a1a2e; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-danger { border-color: #e74c3c; color: #e74c3c; }
    .btn-danger:hover { background: #e74c3c; color: #1a1a2e; }

    /* Sidebar */
    #sidebar { width: 300px; background: #16213e; border-left: 2px solid #0f3460; display: flex; flex-direction: column; }
    .tabs { display: flex; border-bottom: 2px solid #0f3460; }
    .tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }
    .tab-content { flex: 1; overflow-y: auto; display: none; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Stations tab */
    #stations-list { flex: 1; overflow-y: auto; }
    .saved-station { padding: 8px 12px; border-bottom: 1px solid #0f3460; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .saved-station:hover { background: #1a1a2e; }
    .saved-station .info { flex: 1; }
    .saved-station .call { color: #00d4ff; font-weight: bold; font-size: 14px; }
    .saved-station .name { color: #aaa; font-size: 12px; }
    .saved-station .actions { display: flex; gap: 4px; }

    #add-station-form { padding: 10px; border-top: 1px solid #0f3460; }
    #add-station-form input { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 6px 8px; font-family: inherit; font-size: 13px; border-radius: 4px; width: 100%; margin-bottom: 6px; }
    #add-station-form .row { display: flex; gap: 6px; }
    #add-station-form .row input { flex: 1; }

    /* Heard tab */
    .station { padding: 6px 10px; border-bottom: 1px solid #0f3460; font-size: 12px; cursor: pointer; }
    .station:hover { background: #1a1a2e; }
    .station .call { color: #00d4ff; font-weight: bold; }
    .station .time { color: #888; }
    .station .comment { color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Email tab */
    #email-panel { padding: 12px; }
    #email-panel p { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.4; }
    #email-panel input, #email-panel textarea { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 10px; font-family: inherit; font-size: 13px; border-radius: 4px; width: 100%; margin-bottom: 8px; }
    #email-panel textarea { height: 80px; resize: vertical; }
    #email-status { font-size: 12px; margin-top: 6px; min-height: 18px; }
    #email-status.ok { color: #4ecca3; }
    #email-status.err { color: #e74c3c; }

    .aprsfi-link { color: #00d4ff; font-size: 11px; font-weight: normal; text-decoration: none; margin-left: 6px; border: 1px solid #0f3460; padding: 1px 5px; border-radius: 3px; }
    .aprsfi-link:hover { background: #0f3460; text-decoration: none; }

    @media (max-width: 700px) {
        #sidebar { display: none; }
        #map { height: 35%; }
    }
</style>
</head>
<body>

<header>
    <h1>APRS Messenger</h1>
    <span id="status">connecting...</span>
</header>
<div id="pending-bar"></div>
<div id="filter-bar">
    <span class="filter-label">Talking to: <strong id="filter-call"></strong></span>
    <span class="filter-close" id="filter-clear">show all</span>
</div>

<div class="main-layout">
    <div id="left-panel">
        <div id="map"></div>
        <div id="messages-panel">
            <div id="messages"></div>
            <form id="send-form">
                <input type="text" id="dest" placeholder="Callsign" autocomplete="off" spellcheck="false">
                <input type="text" id="text" placeholder="Message" autocomplete="off" spellcheck="false">
                <button type="submit" class="btn">Send</button>
            </form>
        </div>
    </div>

    <div id="sidebar">
        <div class="tabs">
            <div class="tab active" data-tab="stations">Stations</div>
            <div class="tab" data-tab="heard">Heard</div>
            <div class="tab" data-tab="email">Email</div>
        </div>

        <div id="tab-stations" class="tab-content active">
            <div id="stations-list"></div>
            <div id="add-station-form">
                <div class="row">
                    <input type="text" id="new-call" placeholder="Callsign" autocomplete="off" spellcheck="false">
                    <input type="text" id="new-name" placeholder="Name / label" autocomplete="off" spellcheck="false">
                </div>
                <button class="btn btn-sm" id="add-station-btn">Add Station</button>
            </div>
        </div>

        <div id="tab-heard" class="tab-content">
            <div id="heard-list"></div>
        </div>

        <div id="tab-email" class="tab-content">
            <div id="email-panel">
                <p>Send email via the APRS EMAIL-2 gateway. The recipient will see your callsign as the sender.</p>
                <input type="email" id="email-addr" placeholder="recipient@example.com" autocomplete="off" spellcheck="false">
                <textarea id="email-text" placeholder="Message (keep it short — APRS messages are limited to 67 chars)"></textarea>
                <button class="btn" id="email-send-btn">Send Email</button>
                <div id="email-status"></div>
            </div>
        </div>
    </div>
</div>

<script>
let msgIndex = 0;
let allMessages = [];
let filterCall = null;
let activeTab = 'stations';

// Cached data for map
let savedStations = [];
let heardStations = [];

const messagesDiv = document.getElementById('messages');
const heardList = document.getElementById('heard-list');
const stationsList = document.getElementById('stations-list');
const statusEl = document.getElementById('status');
const pendingBar = document.getElementById('pending-bar');
const filterBar = document.getElementById('filter-bar');
const filterCallEl = document.getElementById('filter-call');
const destInput = document.getElementById('dest');
const textInput = document.getElementById('text');
const sendForm = document.getElementById('send-form');

// --- Map ---
const map = L.map('map').setView([39.5, -98.35], 4);  // default until location loaded
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18,
}).addTo(map);
let homeLocation = null;
let mapInitialized = false;  // only auto-fit bounds once

let mapMarkers = [];

function clearMapMarkers() {
    mapMarkers.forEach(m => map.removeLayer(m));
    mapMarkers = [];
}

// APRS symbol code -> emoji/label mapping (symbol_table + symbol_code)
const APRS_SYMBOLS = {
    '/-': '\u{1F3E0}', // house
    '/[': '\u{1F9D1}', // person (jogger)
    '/>': '\u{1F697}', // car
    '/k': '\u{1F69A}', // truck
    '/v': '\u{1F69B}', // van
    '/R': '\u{1F4FB}', // radio/recreational vehicle
    '/y': '\u{1F3E0}', // house with yagi
    '/;': '\u{2600}',  // campground
    '/O': '\u{1F4E1}', // balloon
    '/X': '\u{2708}',  // helicopter
    '/\'':'\u{2708}',  // aircraft small
    '/^': '\u{2708}',  // aircraft large
    '/_': '\u{1F327}', // weather station
    '/r': '\u{1F4E1}', // repeater
    '/&': '\u{26D1}',  // diamond/gateway
    '/I': '\u{1F4E1}', // igate
    '\\K': '\u{1F69C}', // SUV/ATV
    '\\n': '\u{1F6A9}', // triangle/nav buoy
    '\\j': '\u{1F6D1}', // work zone
    '\\s': '\u{1F6A8}', // sheriff/SAR
};

function symbolEmoji(sym) {
    if (!sym || sym.length < 2) return '\u{1F4CD}';  // default pin
    return APRS_SYMBOLS[sym] || '\u{1F4CD}';
}

function stationIcon(sym, color) {
    const emoji = symbolEmoji(sym);
    return L.divIcon({
        className: '',
        html: `<div style="font-size:20px;text-shadow:0 0 3px ${color}, 0 0 6px ${color};">${emoji}</div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
        popupAnchor: [0, -12],
    });
}

function updateMap() {
    clearMapMarkers();
    const bounds = [];

    if (activeTab === 'stations') {
        // Show only saved stations that have a known position from heard data
        const heardMap = {};
        heardStations.forEach(h => { heardMap[h.callsign.toUpperCase()] = h; });

        savedStations.forEach(s => {
            const h = heardMap[s.callsign.toUpperCase()];
            if (!h || h.lat == null) return;
            const marker = L.marker([h.lat, h.lon], { icon: stationIcon(h.symbol, '#00d4ff') })
                .bindPopup(`<b>${escHtml(s.callsign)}</b><br>${escHtml(s.name || '')}<br><small>${escHtml(h.comment || '')}</small><br><a href="${aprsfiUrl(s.callsign)}" target="_blank">aprs.fi</a>`)
                .addTo(map);
            marker.on('click', () => openConversation(s.callsign));
            mapMarkers.push(marker);
            bounds.push([h.lat, h.lon]);
        });
    } else if (activeTab === 'heard') {
        // Show all heard stations from last hour
        const oneHourAgo = new Date(Date.now() - 3600000);
        heardStations.forEach(s => {
            if (s.lat == null) return;
            const seen = new Date(s.last_seen);
            if (seen < oneHourAgo) return;
            const marker = L.marker([s.lat, s.lon], { icon: stationIcon(s.symbol, '#4ecca3') })
                .bindPopup(`<b>${escHtml(s.callsign)}</b><br><small>${s.last_seen}</small><br><small>${escHtml(s.comment || '')}</small><br><a href="${aprsfiUrl(s.callsign)}" target="_blank">aprs.fi</a>`)
                .addTo(map);
            marker.on('click', () => openConversation(s.callsign));
            mapMarkers.push(marker);
            bounds.push([s.lat, s.lon]);
        });
    }

    // Only auto-fit on first load — don't hijack the view on every poll
    if (!mapInitialized) {
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
            mapInitialized = true;
        } else if (homeLocation) {
            map.setView(homeLocation, 11);
            mapInitialized = true;
        }
    }
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        activeTab = tab.dataset.tab;
        mapInitialized = false;  // re-fit when switching tabs
        updateMap();
    });
});

// --- Helpers ---
function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function setDest(callsign) {
    destInput.value = callsign;
    textInput.focus();
}

function openConversation(callsign) {
    filterCall = callsign.toUpperCase();
    destInput.value = filterCall;
    filterCallEl.textContent = filterCall;
    filterBar.style.display = 'flex';
    renderMessages();
    textInput.focus();
}

function clearFilter() {
    filterCall = null;
    filterBar.style.display = 'none';
    renderMessages();
}

document.getElementById('filter-clear').addEventListener('click', clearFilter);

function aprsfiUrl(callsign) {
    return 'https://aprs.fi/#!call=a%2F' + encodeURIComponent(callsign) + '&timerange=3600';
}

// --- Messages ---
function renderMessages() {
    messagesDiv.innerHTML = '';
    const msgs = filterCall
        ? allMessages.filter(m => m.callsign.toUpperCase() === filterCall)
        : allMessages;
    msgs.forEach(msg => {
        const div = document.createElement('div');
        const dir = msg.direction.toLowerCase();
        div.className = 'msg ' + (dir === 'rx' ? 'rx' : dir === 'retry' ? 'retry' : 'tx');
        const arrow = dir === 'rx' ? 'from' : 'to';
        div.innerHTML = `
            <div class="meta">${msg.timestamp} ${msg.direction} ${arrow} ${msg.callsign}</div>
            <div class="body">${escHtml(msg.text)}</div>
        `;
        messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function pollMessages() {
    try {
        const resp = await fetch('/api/messages?since=' + msgIndex);
        const data = await resp.json();
        if (data.messages.length > 0) {
            allMessages = allMessages.concat(data.messages);
            msgIndex = data.total;
            renderMessages();
        }
    } catch(e) {}
}

sendForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const dest = destInput.value.trim().toUpperCase();
    const text = textInput.value.trim();
    if (!dest || !text) return;
    try {
        await fetch('/api/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({to: dest, message: text}),
        });
        destInput.value = dest;
        textInput.value = '';
        textInput.focus();
        if (!filterCall) openConversation(dest);
        await pollMessages();
    } catch(e) {
        alert('Send failed: ' + e);
    }
});

// --- Saved Stations ---
async function loadStations() {
    try {
        const resp = await fetch('/api/stations');
        const data = await resp.json();
        savedStations = data.stations;
        renderStations(savedStations);
        if (activeTab === 'stations') updateMap();
    } catch(e) {}
}

function renderStations(stations) {
    stationsList.innerHTML = '';
    if (stations.length === 0) {
        stationsList.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;">No saved stations. Add your SAR team below.</div>';
        return;
    }
    stations.forEach(s => {
        const div = document.createElement('div');
        div.className = 'saved-station';
        div.innerHTML = `
            <div class="info">
                <div class="call">${escHtml(s.callsign)}</div>
                <div class="name">${escHtml(s.name || '')}</div>
            </div>
            <div class="actions">
                <a href="${aprsfiUrl(s.callsign)}" target="_blank" class="btn btn-sm" title="View on aprs.fi">aprs.fi</a>
                <button class="btn btn-sm btn-danger del-btn">X</button>
            </div>
        `;
        div.querySelector('.info').addEventListener('click', () => {
            openConversation(s.callsign);
            // Zoom map to this station if we have its position
            const h = heardStations.find(h => h.callsign.toUpperCase() === s.callsign.toUpperCase());
            if (h && h.lat != null) map.setView([h.lat, h.lon], 13);
        });
        div.querySelector('.del-btn').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm('Remove ' + s.callsign + ' from saved stations?')) return;
            await fetch('/api/stations?callsign=' + encodeURIComponent(s.callsign), {method: 'DELETE'});
            loadStations();
        });
        stationsList.appendChild(div);
    });
}

document.getElementById('add-station-btn').addEventListener('click', async () => {
    const callsign = document.getElementById('new-call').value.trim().toUpperCase();
    const name = document.getElementById('new-name').value.trim();
    if (!callsign) return;
    await fetch('/api/stations', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({callsign, name}),
    });
    document.getElementById('new-call').value = '';
    document.getElementById('new-name').value = '';
    loadStations();
});

// --- Heard Stations ---
async function pollHeard() {
    try {
        const resp = await fetch('/api/heard');
        const data = await resp.json();
        heardStations = data.stations;
        renderHeard(heardStations);
        updateMap();
    } catch(e) {}
}

function renderHeard(stations) {
    heardList.innerHTML = '';
    if (stations.length === 0) {
        heardList.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;">No stations heard yet. Set a filter in config.json to receive position packets.</div>';
        return;
    }
    stations.forEach(s => {
        const div = document.createElement('div');
        div.className = 'station';
        div.innerHTML = `
            <div class="call">${escHtml(s.callsign)} <a href="${aprsfiUrl(s.callsign)}" target="_blank" class="aprsfi-link">aprs.fi</a></div>
            <div class="time">${s.last_seen}</div>
            <div class="comment">${escHtml(s.comment || '')}</div>
        `;
        div.addEventListener('click', (e) => {
            if (e.target.classList.contains('aprsfi-link')) return;
            openConversation(s.callsign);
            if (s.lat != null) map.setView([s.lat, s.lon], 13);
        });
        heardList.appendChild(div);
    });
}

// --- Email ---
document.getElementById('email-send-btn').addEventListener('click', async () => {
    const email = document.getElementById('email-addr').value.trim();
    const text = document.getElementById('email-text').value.trim();
    const statusDiv = document.getElementById('email-status');
    if (!email || !text) {
        statusDiv.textContent = 'Need email address and message.';
        statusDiv.className = 'err';
        return;
    }
    try {
        const resp = await fetch('/api/email', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, message: text}),
        });
        const data = await resp.json();
        if (data.error) {
            statusDiv.textContent = data.error;
            statusDiv.className = 'err';
        } else {
            statusDiv.textContent = 'Sent via EMAIL-2 (msg#' + data.msg_id + ')';
            statusDiv.className = 'ok';
            document.getElementById('email-text').value = '';
            await pollMessages();
        }
    } catch(e) {
        statusDiv.textContent = 'Failed: ' + e;
        statusDiv.className = 'err';
    }
});

// --- Status ---
async function pollStatus() {
    try {
        const resp = await fetch('/api/status');
        const data = await resp.json();
        if (data.location && !homeLocation) {
            homeLocation = data.location;
            map.setView(homeLocation, 11);
        }
        if (data.connected) {
            statusEl.textContent = data.callsign + ' connected';
            statusEl.className = '';
        } else {
            statusEl.textContent = 'disconnected';
            statusEl.className = 'disconnected';
        }
        if (data.pending > 0) {
            pendingBar.style.display = 'block';
            pendingBar.textContent = data.pending + ' message(s) awaiting ack...';
        } else {
            pendingBar.style.display = 'none';
        }
    } catch(e) {
        statusEl.textContent = 'disconnected';
        statusEl.className = 'disconnected';
    }
}

// --- Poll loops ---
setInterval(pollMessages, 2000);
setInterval(pollHeard, 10000);
setInterval(pollStatus, 5000);

// --- Initial load ---
pollStatus();
pollMessages();
pollHeard();
loadStations();
destInput.focus();

// Fix Leaflet map size after layout renders
setTimeout(() => map.invalidateSize(), 200);
</script>
</body>
</html>
