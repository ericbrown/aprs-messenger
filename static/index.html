<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APRS Messenger</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { background: #16213e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f3460; }
    header h1 { font-size: 18px; color: #00d4ff; }
    #status { font-size: 13px; color: #4ecca3; }
    #status.disconnected { color: #e74c3c; }
    .container { display: flex; flex: 1; overflow: hidden; }
    #messages-panel { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 15px; }
    .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 80%; }
    .msg.tx { background: #0f3460; margin-left: auto; text-align: right; }
    .msg.rx { background: #1a3a1a; }
    .msg.retry { background: #3a3a1a; font-style: italic; font-size: 13px; }
    .msg .meta { font-size: 11px; color: #888; margin-bottom: 3px; }
    .msg .body { word-wrap: break-word; }
    .msg .ack-status { font-size: 11px; color: #4ecca3; margin-top: 3px; }
    .msg .ack-status.failed { color: #e74c3c; }
    #send-form { padding: 12px; background: #16213e; border-top: 2px solid #0f3460; display: flex; gap: 8px; }
    #send-form input { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 12px; font-family: inherit; font-size: 14px; border-radius: 4px; }
    #dest { width: 120px; }
    #text { flex: 1; }
    #send-form button { background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff; padding: 8px 20px; font-family: inherit; font-size: 14px; cursor: pointer; border-radius: 4px; }
    #send-form button:hover { background: #00d4ff; color: #1a1a2e; }
    #sidebar { width: 280px; background: #16213e; border-left: 2px solid #0f3460; display: flex; flex-direction: column; }
    #sidebar h2 { padding: 12px 15px; font-size: 14px; color: #4ecca3; border-bottom: 1px solid #0f3460; }
    #heard-list { flex: 1; overflow-y: auto; padding: 8px; }
    .station { padding: 6px 8px; border-bottom: 1px solid #0f3460; font-size: 12px; }
    .station .call { color: #00d4ff; font-weight: bold; }
    .station .time { color: #888; }
    .station .comment { color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #pending-bar { padding: 6px 15px; background: #2a2a1e; color: #f0c040; font-size: 12px; border-bottom: 1px solid #0f3460; display: none; }
    @media (max-width: 700px) { #sidebar { display: none; } }
</style>
</head>
<body>

<header>
    <h1>APRS Messenger</h1>
    <span id="status">connecting...</span>
</header>
<div id="pending-bar"></div>

<div class="container">
    <div id="messages-panel">
        <div id="messages"></div>
        <form id="send-form">
            <input type="text" id="dest" placeholder="Callsign" autocomplete="off" spellcheck="false">
            <input type="text" id="text" placeholder="Message" autocomplete="off" spellcheck="false">
            <button type="submit">Send</button>
        </form>
    </div>
    <div id="sidebar">
        <h2>Heard Stations</h2>
        <div id="heard-list"></div>
    </div>
</div>

<script>
let msgIndex = 0;
let lastDest = '';

const messagesDiv = document.getElementById('messages');
const heardList = document.getElementById('heard-list');
const statusEl = document.getElementById('status');
const pendingBar = document.getElementById('pending-bar');
const destInput = document.getElementById('dest');
const textInput = document.getElementById('text');
const sendForm = document.getElementById('send-form');

function addMessage(msg) {
    const div = document.createElement('div');
    const dir = msg.direction.toLowerCase();
    div.className = 'msg ' + (dir === 'rx' ? 'rx' : dir === 'retry' ? 'retry' : 'tx');
    const arrow = dir === 'rx' ? 'from' : 'to';
    div.innerHTML = `
        <div class="meta">${msg.timestamp} ${msg.direction} ${arrow} ${msg.callsign}</div>
        <div class="body">${escHtml(msg.text)}</div>
    `;
    div.dataset.msgId = msg.msg_id || '';
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

async function pollMessages() {
    try {
        const resp = await fetch('/api/messages?since=' + msgIndex);
        const data = await resp.json();
        data.messages.forEach(addMessage);
        msgIndex = data.total;
    } catch(e) {}
}

async function pollHeard() {
    try {
        const resp = await fetch('/api/heard');
        const data = await resp.json();
        heardList.innerHTML = '';
        data.stations.forEach(s => {
            const div = document.createElement('div');
            div.className = 'station';
            div.innerHTML = `
                <div class="call">${escHtml(s.callsign)}</div>
                <div class="time">${s.last_seen}</div>
                <div class="comment">${escHtml(s.comment || '')}</div>
            `;
            // Click to set as destination
            div.style.cursor = 'pointer';
            div.addEventListener('click', () => {
                destInput.value = s.callsign;
                textInput.focus();
            });
            heardList.appendChild(div);
        });
    } catch(e) {}
}

async function pollStatus() {
    try {
        const resp = await fetch('/api/status');
        const data = await resp.json();
        if (data.connected) {
            statusEl.textContent = data.callsign + ' connected';
            statusEl.className = '';
        } else {
            statusEl.textContent = 'disconnected';
            statusEl.className = 'disconnected';
        }
        if (data.pending > 0) {
            pendingBar.style.display = 'block';
            pendingBar.textContent = data.pending + ' message(s) awaiting ack...';
        } else {
            pendingBar.style.display = 'none';
        }
    } catch(e) {
        statusEl.textContent = 'disconnected';
        statusEl.className = 'disconnected';
    }
}

sendForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const dest = destInput.value.trim().toUpperCase();
    const text = textInput.value.trim();
    if (!dest || !text) return;

    try {
        await fetch('/api/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({to: dest, message: text}),
        });
        lastDest = dest;
        destInput.value = dest;  // keep destination for follow-up messages
        textInput.value = '';
        textInput.focus();
        // Immediately poll for the new message
        await pollMessages();
    } catch(e) {
        alert('Send failed: ' + e);
    }
});

// Poll loops
setInterval(pollMessages, 2000);
setInterval(pollHeard, 10000);
setInterval(pollStatus, 5000);

// Initial load
pollStatus();
pollMessages();
pollHeard();
destInput.focus();
</script>
</body>
</html>
